<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Organograma (D3)</title>

  <!-- Estilo principal -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Fallback mínimo (se o styles.css falhar por caminho errado, ainda fica usável) -->
  <style>
    body{margin:0;font:14px/1.4 system-ui,Segoe UI,Roboto,Arial;background:#f6f8fb}
    .toolbar{position:fixed;top:0;left:0;right:0;height:56px;background:#fff;border-bottom:1px solid #d6d9df;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;z-index:10}
    .toolbar input,.toolbar select,.toolbar button{height:32px}
    #orgChart{position:absolute;top:56px;left:0;right:0;bottom:0;min-height:calc(100vh - 56px);background:#f0f4f8;overflow:auto}
    .tooltip{position:fixed;display:none;background:#fff;border:1px solid #d6d9df;border-radius:12px;padding:10px 12px;box-shadow:0 8px 24px rgba(16,24,40,.14);max-width:320px;z-index:1000;font-size:13px}
    .tooltip.show{display:block}
    .tooltip .title{font-weight:700;margin-bottom:4px}
  </style>

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <header class="toolbar">
    <div class="left">
      <button id="expandAll" title="Expandir tudo">Expandir</button>
      <button id="collapseAll" title="Recolher níveis profundos">Recolher</button>
      <button id="fitView" title="Centralizar/fit">Centralizar</button>
      <button id="zoomIn" title="Zoom +">+</button>
      <button id="zoomOut" title="Zoom −">−</button>
    </div>
    <div class="right">
      <input id="searchInput" type="text" placeholder="Buscar por nome/cargo/depto..." />
      <select id="departmentFilter" title="Filtrar por departamento">
        <option value="">Todos os departamentos</option>
      </select>
    </div>
  </header>

  <main id="orgChart" aria-label="Organograma"></main>
  <div id="tooltip" class="tooltip" role="dialog" aria-hidden="true"></div>

  <script src="js/organograma.js"></script>
</body>
</html>
